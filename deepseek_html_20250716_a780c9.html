<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample 1</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

        :root {
            --primary: rgb(12, 12, 207);
            --secondary: #8b5cf6;
            --accent: #ec4899;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--light);
            min-height: 100vh;
            padding: 2rem;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .nav-links {
            display: flex;
            gap: 1.5rem;
        }

        .nav-links a {
            color: var(--light);
            text-decoration: none;
            font-weight: 500;
            padding: 0.5rem 1rem;
            border-radius: 50px;
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Form */
        .glass-form {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 2rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 3rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .form-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: none;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            color: var(--light);
            font-family: 'Poppins', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.2);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .form-button {
            background: linear-gradient(to right, var(--accent), #f43f5e);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .form-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        @media (max-width: 1024px) {
            .grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
                align-items: center;
                gap: 1.2rem;
                margin-bottom: 1.5rem;
            }

            .logo {
                margin-bottom: 0.5rem;
            }

            .nav-links {
                flex-direction: column;
                gap: 0.8rem;
                width: 100%;
                align-items: center;
            }

            .nav-links a {
                width: 90%;
                text-align: center;
                padding: 0.7rem 0;
                font-size: 1.1rem;
            }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            height: 340px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.2);
        }

        .card-image-container {
            position: relative;
            height: 140px;
            flex-shrink: 0;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-badge {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            z-index: 1;
        }

        .verified {
            background: linear-gradient(to right, #10b981, #34d399);
        }

        .card-profile {
            position: absolute;
            bottom: -1.5rem;
            left: 1.5rem;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.3);
            object-fit: cover;
            z-index: 1;
        }

        .card-content {
            padding: 1.5rem 1.5rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .card-motto {
            font-size: 0.85rem;
            line-height: 1.4;
            margin-bottom: 0.8rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .card-stats {
            display: flex;
            justify-content: space-between;
            margin: 0.5rem 0 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.9rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
            margin-top: auto;
            padding-top: 0.5rem;
            flex-shrink: 0;
        }

        .action-button {
            flex: 1;
            padding: 0.5rem;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .action-button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Bubbles background - UPDATED */
        .bubbles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        .bubble {
            position: absolute;
            bottom: -100px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 50%;
            animation: rise 10s infinite ease-in;
            pointer-events: none;
        }

        @keyframes rise {
            0% {
                bottom: -100px;
                transform: translateX(0);
            }

            50% {
                transform: translateX(100px);
            }

            100% {
                bottom: 1000px;
                transform: translateX(-200px);
            }
        }

        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 40px;
            height: 40px;
            background: none;
            border: none;
            cursor: pointer;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 26px;
            height: 3px;
            margin: 4px 0;
            background: var(--light);
            border-radius: 2px;
            transition: all 0.3s;
        }

        @media (max-width: 600px) {
            .header {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                gap: 0;
                margin-bottom: 1.5rem;
            }

            .logo {
                margin-bottom: 0;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                position: absolute;
                top: 60px;
                right: 16px;
                background: rgba(255, 255, 255, 0.12);
                backdrop-filter: blur(14px);
                border-radius: 20px;
                box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
                border: 1px solid rgba(255, 255, 255, 0.22);
                flex-direction: column;
                gap: 0.8rem;
                width: 200px;
                align-items: flex-start;
                padding: 1.2rem 1rem;
                transition: opacity 0.35s cubic-bezier(0.4, 0, 0.2, 1), transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
                z-index: 1000;
                display: flex;
                opacity: 0;
                pointer-events: none;
                transform: translateY(-20px) scale(0.98);
            }

            .nav-links.open {
                opacity: 1;
                pointer-events: auto;
                transform: translateY(0) scale(1);
            }

            .nav-links a {
                width: 100%;
                text-align: left;
                padding: 0.7rem 0.5rem;
                font-size: 1.1rem;
                opacity: 0;
                transform: translateY(-10px);
                transition: opacity 0.3s, transform 0.3s;
            }

            .nav-links.open a {
                opacity: 1;
                transform: translateY(0);
            }

            .nav-links.open a:nth-child(1) {
                transition-delay: 0.08s;
            }

            .nav-links.open a:nth-child(2) {
                transition-delay: 0.16s;
            }

            .nav-links.open a:nth-child(3) {
                transition-delay: 0.24s;
            }

            .nav-links.open a:nth-child(4) {
                transition-delay: 0.32s;
            }
        }

        /* Optional: animate hamburger to X when open */
        .hamburger.open span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }

        .hamburger.open span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Color picker button */
        .color-picker-button {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            z-index: 1000;
        }

        .color-picker-button svg {
            width: 24px;
            height: 24px;
            fill: var(--light);
        }

        .color-picker-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        /* Hero area */
        .hero {
            position: relative;
            width: 100%;
            height: 400px;
            overflow: hidden;
            border-radius: 2rem;
        }

        .hero-bg-container {
            position: relative;
            width: 100vw;
            min-height: 320px;
            margin-bottom: 2.5rem;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
            box-sizing: border-box;
            border-radius: 2.5rem;
            overflow: hidden;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            width: 100vw;
            height: 100%;
            overflow: hidden;
            z-index: 1;
            pointer-events: auto;
            user-select: none;
            border-radius: 0 0 2.5rem 2.5rem;
        }

        .hero-bg::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(to bottom, var(--primary) 0%, transparent 100%);
            z-index: 10;
            pointer-events: none;
        }

        .hero-waves {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .hero-waves svg {
            position: absolute;
            width: 100%;
            height: 100%;
            fill: none;
            pointer-events: none;
        }

        .hero-waves svg path {
            opacity: 0.5;
        }

        .hero-waves svg linearGradient {
            stop {
                stop-color: var(--primary);
            }
        }

        .hero-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            text-align: center;
            padding: 0 2rem;
        }

        .hero-title {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
        }

        .hero-subtitle {
            font-size: 1.2rem;
            font-weight: 400;
            margin-bottom: 2rem;
        }

        .hero-cta {
            background: linear-gradient(to right, var(--accent), #f43f5e);
            color: white;
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(236, 72, 153, 0.3);
        }

        .hero-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(236, 72, 153, 0.4);
        }

        .hero-bg-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            pointer-events: none;
            border-radius: 0 0 2.5rem 2.5rem;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">
</head>

    <script>
        // --- Animated Waves ---
        const wave1 = document.getElementById('wave1');
        const wave2 = document.getElementById('wave2');
        let t = 0;
        function animateWaves() {
            t += 0.012;
            // Animate wave1
            let d1 = '';
            for (let i = 0; i <= 1440; i += 80) {
                let y = 160 + Math.sin((i / 1440) * 4 * Math.PI + t) * 18 + Math.cos((i / 1440) * 2 * Math.PI + t * 1.2) * 10;
                d1 += (i === 0 ? 'M' : 'L') + i + ',' + y;
            }
            d1 += 'L1440,320L0,320Z';
            wave1.setAttribute('d', d1);
            // Animate wave2
            let d2 = '';
            for (let i = 0; i <= 1440; i += 80) {
                let y = 200 + Math.sin((i / 1440) * 3 * Math.PI + t * 0.8) * 14 + Math.cos((i / 1440) * 2.5 * Math.PI + t * 1.5) * 8;
                d2 += (i === 0 ? 'M' : 'L') + i + ',' + y;
            }
            d2 += 'L1440,320L0,320Z';
            wave2.setAttribute('d', d2);
            requestAnimationFrame(animateWaves);
        }
        animateWaves();

        // --- Floating Bubbles ---
        const heroBubbles = document.getElementById('heroBubbles');
        for (let i = 0; i < 18; i++) {
            const b = document.createElement('div');
            b.className = 'hero-bubble';
            const size = Math.random() * 32 + 18;
            b.style.width = `${size}px`;
            b.style.height = `${size}px`;
            b.style.left = `${Math.random() * 100}%`;
            b.style.bottom = `-${size + 10}px`;
            b.style.opacity = Math.random() * 0.25 + 0.12;
            b.style.animationDelay = `${Math.random() * 3}s`;
            b.style.background = `linear-gradient(135deg, var(--primary), var(--secondary))`;
            heroBubbles.appendChild(b);
        }
        // Bubble animation CSS
        const style = document.createElement('style');
        style.innerHTML = `
    .hero-bubble {
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
        animation: hero-bubble-rise 8s linear infinite;
        filter: blur(0.5px);
    }
    @keyframes hero-bubble-rise {
        0% { transform: translateY(0) scale(1); }
        80% { opacity: 1; }
        100% { transform: translateY(-320px) scale(1.15); opacity: 0; }
    }
    `;
        document.head.appendChild(style);

        // --- Water Ripple Effect ---
        const rippleCanvas = document.getElementById('rippleCanvas');
        function resizeRippleCanvas() {
            rippleCanvas.width = rippleCanvas.offsetWidth;
            rippleCanvas.height = rippleCanvas.offsetHeight;
        }
        window.addEventListener('resize', resizeRippleCanvas);
        setTimeout(resizeRippleCanvas, 100); // Initial
        // Draw ripple at (x, y)
        function drawRipple(x, y) {
            const ctx = rippleCanvas.getContext('2d');
            const maxR = Math.max(rippleCanvas.width, rippleCanvas.height) * 0.5;
            let r = 0;
            let alpha = 0.35;
            function animate() {
                ctx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                ctx.save();
                ctx.beginPath();
                ctx.arc(x, y, r, 0, 2 * Math.PI);
                ctx.strokeStyle = `rgba(139,92,246,${alpha})`;
                ctx.lineWidth = 4 + 2 * (1 - r / maxR);
                ctx.shadowColor = 'rgba(12,12,207,0.18)';
                ctx.shadowBlur = 12;
                ctx.stroke();
                ctx.restore();
                r += 8;
                alpha *= 0.96;
                if (alpha > 0.04 && r < maxR) {
                    requestAnimationFrame(animate);
                } else {
                    ctx.clearRect(0, 0, rippleCanvas.width, rippleCanvas.height);
                }
            }
            animate();
        }
        document.getElementById('heroBg').addEventListener('click', function (e) {
            const rect = rippleCanvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (rippleCanvas.width / rect.width);
            const y = (e.clientY - rect.top) * (rippleCanvas.height / rect.height);
            drawRipple(x, y);
        });
    </script>

    <script>
        // 20 beautiful palette colors
        const paletteColors = [
            '#0c0ccf', '#8b5cf6', '#ec4899', '#f43f5e', '#10b981', '#f59e42', '#fbbf24', '#fde68a',
            '#2563eb', '#1e293b', '#f8fafc', '#64748b', '#eab308', '#a21caf', '#be185d', '#0891b2',
            '#22d3ee', '#f472b6', '#b91c1c', '#7c3aed'
        ];
        const colorPaletteBtn = document.getElementById('colorPaletteBtn');
        const colorPalettePopup = document.getElementById('colorPalettePopup');
        // Render swatches
        colorPalettePopup.innerHTML = paletteColors.map(color =>
            `<div class="color-swatch" tabindex="0" style="background:${color}" data-color="${color}"></div>`
        ).join('');
        // Popup logic
        let popupOpen = false;
        function openPalettePopup() {
            // Highlight current
            const current = getComputedStyle(document.documentElement).getPropertyValue('--primary').trim().toLowerCase();
            colorPalettePopup.querySelectorAll('.color-swatch').forEach(swatch => {
                if (swatch.getAttribute('data-color').toLowerCase() === current) {
                    swatch.classList.add('selected');
                } else {
                    swatch.classList.remove('selected');
                }
            });
            colorPalettePopup.classList.add('open');
            colorPalettePopup.style.display = 'flex';
            popupOpen = true;
        }
        function closePalettePopup() {
            colorPalettePopup.classList.remove('open');
            setTimeout(() => { if (!popupOpen) colorPalettePopup.style.display = 'none'; }, 250);
            popupOpen = false;
        }
        colorPaletteBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            if (popupOpen) {
                closePalettePopup();
            } else {
                openPalettePopup();
            }
        });
        // Swatch click logic
        colorPalettePopup.addEventListener('click', (e) => {
            const swatch = e.target.closest('.color-swatch');
            if (swatch) {
                document.documentElement.style.setProperty('--primary', swatch.getAttribute('data-color'));
                updateWaveGradient && updateWaveGradient();
                closePalettePopup();
            }
        });
        // Keyboard accessibility
        colorPalettePopup.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                const swatch = e.target.closest('.color-swatch');
                if (swatch) {
                    document.documentElement.style.setProperty('--primary', swatch.getAttribute('data-color'));
                    updateWaveGradient && updateWaveGradient();
                    closePalettePopup();
                }
            }
        });
        // Close popup on outside click
        document.addEventListener('mousedown', (e) => {
            if (popupOpen && !colorPalettePopup.contains(e.target) && !colorPaletteBtn.contains(e.target)) {
                closePalettePopup();
            }
        });
        // Optional: close on ESC
        document.addEventListener('keydown', (e) => {
            if (popupOpen && e.key === 'Escape') closePalettePopup();
        });
    </script>
    <script>
        // Bubble bounce effect for 'SAY HELLO TO ZIMBABWE'
        window.addEventListener('DOMContentLoaded', function () {
            const hello = document.querySelector('.hero-overlay-content');
            if (hello) {
                const text = hello.textContent.trim();
                hello.innerHTML = text.split('').map((char, i) => {
                    if (char === ' ') return ' ';
                    return `<span class="bubble-bounce" style="animation-delay:${i * 0.08}s">${char}</span>`;
                }).join('');
            }
        });
    </script>
