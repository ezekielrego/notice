<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Superuser API Token</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f6fb;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 500px;
            margin: 60px auto;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
            padding: 32px 28px 28px 28px;
        }
        h2 {
            color: #2d3748;
            margin-bottom: 12px;
        }
        .token-label {
            color: #4a5568;
            font-size: 1rem;
            margin-bottom: 8px;
        }
        .token-box {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 16px;
            font-size: 1.1rem;
            word-break: break-all;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .copy-btn {
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 8px 16px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .copy-btn:hover {
            background: #1d4ed8;
        }
        .user-info {
            color: #64748b;
            font-size: 0.95rem;
            margin-bottom: 24px;
        }
        .success {
            color: #16a34a;
            margin-top: 10px;
            font-size: 0.98rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Superuser API Token</h2>
        <div class="user-info">
            Logged in as: <b>{{ user.username }}</b> ({{ user.email }})
        </div>
        <div class="token-label">Your permanent API token:</div>
        <div class="token-box" id="token-box">
            <span id="token-value">{{ token }}</span>
            <button class="copy-btn" onclick="copyToken()">Copy</button>
        </div>
        <div id="copy-success" class="success" style="display:none;">Token copied to clipboard!</div>
        <p style="color:#64748b; font-size:0.95rem;">Use this token in the <b>Authorization</b> header:<br>
            <code>Authorization: Token &lt;your_token&gt;</code>
        </p>
    </div>
    <script>
        function copyToken() {
            var token = document.getElementById('token-value').innerText;
            navigator.clipboard.writeText(token).then(function() {
                document.getElementById('copy-success').style.display = 'block';
                setTimeout(function() {
                    document.getElementById('copy-success').style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
